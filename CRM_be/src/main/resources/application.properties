# Tên ứng dụng
spring.application.name=CRM_be

# 1. Cấu hình kết nối MySQL (Đảm bảo url trỏ đúng về crm_banhang)
spring.datasource.url=jdbc:mysql://localhost:3306/crm_banhang?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Cấu hình Hibernate (Tự động sinh bảng và log SQL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect